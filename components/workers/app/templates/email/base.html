<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ subject }}</title>
  </head>
  <body style="margin: 0; padding: 0; background: #070b14; color: #e5e7eb">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="
        padding: 32px 12px;
        background: radial-gradient(circle at 15% 10%, #19203a 0%, #070b14 55%);
      "
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="620"
            cellpadding="0"
            cellspacing="0"
            style="
              max-width: 620px;
              width: 100%;
              border-collapse: separate;
              border-spacing: 0;
              background: #0e1424;
              border: 1px solid #27314f;
              border-radius: 14px;
              overflow: hidden;
              box-shadow: 0 18px 48px rgba(3, 7, 18, 0.45);
            "
          >
            <tr>
              <td
                style="
                  padding: 0;
                  background: linear-gradient(
                    90deg,
                    #38bdf8 0%,
                    #6366f1 45%,
                    #22d3ee 100%
                  );
                  height: 4px;
                  font-size: 0;
                  line-height: 0;
                "
              >
                &nbsp;
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 26px 28px 20px;
                  background: #0e1424;
                  font-family:
                    &quot;Segoe UI&quot;, &quot;Helvetica Neue&quot;, Helvetica,
                    Arial, sans-serif;
                "
              >
                <table
                  role="presentation"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                >
                  <tr>
                    <td
                      align="left"
                      style="
                        font-size: 12px;
                        letter-spacing: 0.12em;
                        text-transform: uppercase;
                        color: #7dd3fc;
                        font-weight: 700;
                      "
                    >
                      Ethitrust Platform
                    </td>
                  </tr>
                  <tr>
                    <td
                      align="left"
                      style="
                        padding-top: 8px;
                        font-size: 26px;
                        line-height: 1.25;
                        font-weight: 700;
                        color: #f8fafc;
                      "
                    >
                      {{ subject }}
                    </td>
                  </tr>
                  {% if event %}
                  <tr>
                    <td style="padding-top: 14px">
                      <span
                        style="
                          display: inline-block;
                          border: 1px solid #334155;
                          border-radius: 999px;
                          padding: 5px 12px;
                          font-size: 11px;
                          line-height: 1;
                          color: #cbd5e1;
                          letter-spacing: 0.08em;
                          text-transform: uppercase;
                        "
                      >
                        {{ event }}
                      </span>
                    </td>
                  </tr>
                  {% endif %}
                </table>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 0 28px 26px;
                  font-family:
                    &quot;Segoe UI&quot;, &quot;Helvetica Neue&quot;, Helvetica,
                    Arial, sans-serif;
                  color: #cbd5e1;
                "
              >
                <table
                  role="presentation"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  style="
                    background: #121a2d;
                    border: 1px solid #263352;
                    border-radius: 12px;
                  "
                >
                  <tr>
                    <td
                      style="
                        padding: 24px 22px;
                        font-size: 16px;
                        line-height: 1.65;
                        color: #dbe6fb;
                      "
                    >
                      {% block content %}{% endblock %}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 16px 28px 24px;
                  font-family:
                    &quot;Segoe UI&quot;, &quot;Helvetica Neue&quot;, Helvetica,
                    Arial, sans-serif;
                  font-size: 12px;
                  line-height: 1.6;
                  color: #94a3b8;
                  border-top: 1px solid #1f2a44;
                "
              >
                <strong style="color: #cbd5e1">Ethitrust</strong> · Secure
                digital transactions for modern teams.<br />
                © {{ year }} Ethitrust. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
