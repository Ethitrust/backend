syntax = "proto3";
package organization;

service OrganizationService {
    rpc CheckOrgMembership (OrgMembershipRequest) returns (OrgMembershipExistsResponse);
    rpc CheckOrganizationExists (OrganizationExistsRequest) returns (OrganizationExistsResponse);
    rpc VerifySecretKey (VerifySecretKeyRequest) returns (VerifySecretKeyResponse);
}

message OrgMembershipRequest {
    string user_id = 1;
    string org_id = 2;
}

message OrgMembershipExistsResponse {
    bool is_member = 1;
}

message OrganizationExistsRequest {
    string org_id = 1;
}

message OrganizationExistsResponse {
    bool exists = 1;
}

message VerifySecretKeyRequest {
    string secret_key = 1;
}

message VerifySecretKeyResponse {
    bool valid = 1;
    string org_id = 2;
    string public_key = 3;
    string status = 4;
}